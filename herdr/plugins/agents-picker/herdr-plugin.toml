id = "yxhta.agents-picker"
name = "Agents Picker"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Workspace-picker-style fuzzy picker for Herdr-detected agent panes"
platforms = ["macos", "linux"]

# Runs on `herdr plugin install` only; linked local checkouts build manually
# (see README.md — this repo builds via `mise x rust@stable -- cargo build`).
[[build]]
command = ["cargo", "build", "--release", "--locked"]

# Keybinding entrypoint: bind with `type = "plugin_action"` and
# `command = "yxhta.agents-picker.open"` in herdr's config.toml.
[[actions]]
id = "open"
title = "Open agents picker"
contexts = ["workspace"]
command = ["./target/release/agents-picker", "--open"]

[[panes]]
id = "picker"
title = "Agents"
placement = "popup"
width = "85%"
height = "75%"
command = ["./target/release/agents-picker"]
