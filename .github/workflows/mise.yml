name: mise

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: mise-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: mise bootstrap smoke test
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Validate configuration and hooks
        run: |
          mise config ls
          hk validate
          hk check --all

      - name: Bootstrap dry run
        run: mise bootstrap --dry-run
