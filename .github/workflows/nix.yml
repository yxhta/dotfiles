name: nix

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: flake check + build
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (Determinate)
        uses: DeterminateSystems/nix-installer-action@main

      - name: nix flake check
        run: nix flake check ./nix --no-build --show-trace

      - name: nix build darwinConfigurations
        run: nix build ./nix#darwinConfigurations.mac.system ./nix#darwinConfigurations.work.system --no-link --print-build-logs
