# vim: ft=tmux
# ============================================================================
# macOS-specific Tmux Configuration
# ============================================================================

# Clipboard integration with macOS works via pbcopy directly on modern macOS
# (reattach-to-user-namespace is no longer required).

# ============================================================================
# Terminal Capabilities
# ============================================================================

# Undercurl support (for better display of underlined text)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Underscore colors support (requires tmux 3.0+)
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'