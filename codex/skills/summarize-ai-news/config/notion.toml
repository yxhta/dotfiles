# Notion append target for summarize-ai-news.
# Store only non-secret page metadata here. Notion auth belongs to the Notion app/connector.
# For a private target page, create config/notion.local.toml with the same keys; it is gitignored.
enabled = true

# Set this to a Notion page URL or page ID.
target_page = ""

# "append" writes directly to target_page. "daily_child_page" treats target_page
# as a parent page and writes to a YYYY/MM/DD child page in the configured timezone.
target_mode = "append"

# "end" appends to the bottom. "start" prepends to the top.
position = "end"

# Supported placeholders: {date}, {datetime}, {source}, {timeframe}.
heading_template = "AI News Digest - {date}"

timezone = "Asia/Tokyo"
